version: '3.8'

services:
  ghost:
    image: ghost:6-alpine
    container_name: ghost_cms
    restart: always
    ports:
      - 2368:2368 # Synology Reverse Proxy matches this port to route incoming 443 traffic here
    environment:
      # We specify localhost here. The Reverse Proxy handles the actual outward domain matching.
      # If Ghost creates weird redirect loops, change this to your primary domain (e.g., https://www.jrhoun.com)
      url: https://www.jrhoun.com
      database__client: mysql
      database__connection__host: db
      database__connection__user: root
      database__connection__password: ${MYSQL_ROOT_PASSWORD}
      database__connection__database: ghost

      # SAFETY BELT: Disable email verification for staff login during maintenance
      staff__authentication__verify: "true"

      # Mailgun SMTP Configuration for Transactional/Login Emails
      mail__from: '"Looking for the Fig Tree" <noreply@jrhoun.com>'
      mail__transport: SMTP
      mail__options__service: Mailgun
      mail__options__host: smtp.mailgun.org
      mail__options__port: 465
      mail__options__secureConnection: true
      mail__options__auth__user: ${MAILGUN_USER}
      mail__options__auth__pass: ${MAILGUN_PASS}
    extra_hosts:
      - "www.jrhoun.com:192.168.50.62"
      - "jrhoun.com:192.168.50.62"
    volumes:
      # On Synology, map /volume1/docker/ghost/content to the container volume below
      - ./content:/var/lib/ghost/content
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: ghost_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ghost
    volumes:
      # Using a Named Volume instead of a bind mount to bypass Synology BTRFS redo-log locking issues
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Optional but recommended on Synology for lower memory footprint
    command: --default-authentication-plugin=mysql_native_password

volumes:
  db_data:
